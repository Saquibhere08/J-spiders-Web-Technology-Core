<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex : row space-between center </title>
    <style>
        ul{
            border: 3px solid red;
            list-style-type: none;
            padding-left: 0px;
            gap: 20px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        li{
            background-color: rgb(255, 145, 0);
            height: 50px;
        }
    </style>
</head>
<body>
    <h1>Flex : row space-between center </h1>
    <ul>
        <li>list items</li>
        <li>list items</li>
        <li>list items</li>
        <li>list items</li>
        <li>list items</li>
    </ul>
</body>
</html>
