<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display: None</title>
    <style>
        h1{
            visibility: hidden; /*Visibility: hidden - it will create the space.*/
        }
    </style>
</head>
<body>
    <h1>Display: None - visibility: hidden; Property</h1>
    <p>It will not display the elements in webpage</p>
    <p>Space is created in webpage</p>
</body>
</html>
