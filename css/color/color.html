<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Color Formats</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1>CSS Color Formats</h1>
    
    <div class="color-box predefined">Predefined Color: yellow</div>
    <div class="color-box rgb">RGB: rgb(250, 80, 80)</div>
    <div class="color-box rgba">RGBA with Transparency: rgba(0, 100, 255, 0.7)</div>
    <div class="color-box hsl">HSL: hsl(120, 100%, 50%)</div>
    <div class="color-box hsla">HSLA with Transparency: hsla(280, 100%, 60%, 0.8)</div>
    <div class="color-box hex">Hexadecimal: #11520d</div>
</body>
</html>
