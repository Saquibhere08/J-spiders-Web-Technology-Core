<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Before Pseudo-Elements-Selectors</title>
    <style>
        a::before{
            content: 'Please';
        }
    </style>
</head>
<body>
    <h1>Before Pseudo-Elements-Selectors</h1>
    <hr>
    <p>It is used to add content before the content of any element.</p>
<br>
    <a href="www.google.com">Click</a>
</body>
</html>
