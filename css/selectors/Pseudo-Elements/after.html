<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>After Pseudo-Elements-Selectors</title>
    <style>
        a::before{
            content: 'Please';
        }
        a::after{
            content: 'Here';
        }
    </style>
</head>
<body>
    <h1>After Pseudo-Elements-Selectors</h1>
    <hr>
    <p>It is used to add content after the content of any element.</p>
<br>Google.com <br>
    <a href="www.google.com">Click</a>
</body>
</html>
