<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nth-child Pseudo-class Selector</title>
    <style>
        li:nth-child(even){
            background-color: red;
        }
        li:nth-child(odd){
            background-color: blue;
        }
    </style>
</head>
<body>
    <h1>nth child Pseudo-class Selector</h1>
    <hr>
    <p>It will target the specified element if it is the nth child of its parent element</p>
    <p>In nth Child we can give any number / even / odd.</p>
    <ul>
        <li>items</li>
        <li>items</li>
        <li>items</li>
        <li>items</li>
        <li>items</li>
    </ul>
    <ol>
        <li>list</li>
        <li>list</li>
        <li>list</li>
        <li>list</li>
        <li>list</li>
    </ol>
</body>
</html>
