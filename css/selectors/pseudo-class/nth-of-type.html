<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nth-of-type Pseudo-class Selector</title>
    <style>
        li:nth-of-type(1){
            background-color: red;
        }
        li:nth-of-type(3){
            background-color: blue;
        }
    </style>
</head>
<body>
    <h1>nth-of-Type Pseudo-class Selector</h1>
    <hr>
    <p>It will target the specified element if it is the nth-of-type of its parent element</p>
    <p>In nth-of-type we can give any number / even / odd.</p>
    <ul>
        <li>items</li>
        <li>items</li>
        <li>items</li>
        <li>items</li>
        <li>items</li>
    </ul>
    <ol>
        <li>list</li>
        <li>list</li>
        <li>list</li>
        <li>list</li>
        <li>list</li>
    </ol>
</body>
</html>
