<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Pseudoclass Selector</title>
    <style>
        a:link{
            color: orange;
        
        }
        #link1:link{
            color: yellow;
        }
    </style>
</head>
<body>
    <h1>Link Pseudoclass Selector</h1>
    <hr>
    <p>It is used to target the Unvisited state of an hyperlink</p>


    <hr>
    <a href="class/path/os/dbms">Click here</a> <br>
    <a href="class/abc" id="link1">Click here</a>
</body>
</html>
