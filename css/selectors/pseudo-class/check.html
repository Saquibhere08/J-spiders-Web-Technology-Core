<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>checked Pseudo-class Selector</title>
    <style>
        .radio:checked{
            accent-color: red;
        }
        .checkbox:checked{
            accent-color: orange;
        }
    </style>
</head>
<body>
    <h1>Checked Pseudo-class Selector</h1>
    <hr>
    <p>It is used to target the checked state of radio / checkbox.</p>
    Gender:
    <input type="radio" class="radio">Male 
    <input type="radio" class="radio">Female <br><br>
    Language: 
    <input type="checkbox" class="checkbox">Hindi 
    <input type="checkbox" class="checkbox">English <br><br>
    <input type="checkbox" class="checkbox">Others <br><br>

</body>
</html>
