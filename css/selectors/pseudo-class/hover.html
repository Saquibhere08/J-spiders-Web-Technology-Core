<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Pseudoclass Selectort</title>
    <style>
        button:hover{
            background-color: red;
            color: white;
        }
        #red:hover{
            background-color: red;
        }
        #yellow:hover{
            background-color: yellow;
        }
        #bule:hover{
            background-color: blue;
        }
        #green:hover{
            background-color: green;
        }
        #orange:hover{
            background-color: orange;
        }
    </style>
</head>
<body>
    <h1>Hover Pseudoclass Selector</h1>
    <p>It is used to target the hover state of any element</p>
    <p>When user place the cursor on an element than we say that the element is in hover state.</p>
    <button>Click</button>

    <ul>
        <li id="red">Red</li>
        <li id="yellow">Yello</li>
        <li id="bule">Bule</li>
        <li id="green">Green</li>
        <li id="orange">Orange</li>
    </ul>
</body>
</html>
