<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Pseudo-class Selector</title>
    <style>
        #ip1:focus{
            background-color: red;
        }
        #ip2:focus{
            background-color: yellow;
        }
        #ip3:focus{
            background-color: green;
        }
    </style>
</head>
<body>
    <h1>Focus Pseudo-class Selector</h1>
    <hr>
    <p>It is used to target the focus state of input field</p>
    <input type="text" id="ip1">
    <input type="text" id="ip2">
    <input type="text" id="ip3">
</body>
</html>
