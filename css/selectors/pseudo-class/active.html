<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Pseudo-class Selector</title>
    <style>
        a:active{
            color: yellow;
        }
    </style>
</head>
<body>
    <h1>Active Pseudoclass Selector</h1>
    <hr>
    <p>It is used to target the active state of an hyperlink</p>
    <a href="www.amazon.in">Amazoooooooooooon</a>
</body>
</html>
