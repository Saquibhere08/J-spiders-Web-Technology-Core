<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combinators 1</title>
    <style>
        ul>li+li{
            color: red;
        }
    </style>
</head>
<body>
    <ul>
        <h1>Unordered List</h1>
        <li>List Items</li>
        <li>List Items</li>
        <li>List Items</li>
        <li>List Items</li>
        <li>List Items</li>
    </ul>
    <ol>
        <h1>Ordered List</h1>
        <li>List items</li>
        <li>List items</li>
        <li>List items</li>
    </ol>
</body>
</html>
