<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Descent Selectors</title>
    <style>
      div h1 {
        color: red;
      }
    </style>
  </head>
  <body>
    <h1>Descendant Selectors</h1>
    <p>
      It is used to target both the direct and indirect members of the specified
      tag.
    </p>
    <p>It is represented with <b> ''space'' </b></p>
<br><br><br><br><br>
    <div>
      <h1>Direct member of div</h1>
      <p>Direct member of div</p>
      <span>
        <h1>InDirect member of div</h1>
        <p>InDirect member of div</p>
      </span>
    </div>
  </body>
</html>
