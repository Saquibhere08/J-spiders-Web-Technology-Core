<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Background Properties</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        
        .box {
            height: 300px;
            width: 600px;
            margin: 20px auto;
            border: 2px solid #333;
            background-image: url('https://picsum.photos/id/1015/600/300');
            background-size: 300px 300px;
            background-repeat: no-repeat;
            background-position: right center;
            padding: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }
        
        h1 { text-align: center; }
    </style>
</head>
<body>
    <h1>CSS Background Properties</h1>
    
    <div class="box">
        <h2>Background Image Example</h2>
        <p>This box demonstrates <code>background-image</code>, <code>background-size</code>, 
        <code>background-repeat</code>, and <code>background-position</code>.</p>
    </div>
</body>
</html>
