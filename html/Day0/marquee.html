<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <marquee behavior="alternate" direction="right" scrollamount="20">
    <h1>Marquee Tag</h1>
    </marquee>
    <hr>
    <marquee>
        <p>
            It will make the content to scoll on the webpage. 
            Its atrributes are direction, scrollamount, behavior
        </p>
    </marquee>
    <hr>

    <marquee>By Default Move Left</marquee>
    <hr>

    <marquee direction="right">Move Right</marquee>
    <hr>

    <marquee direction="up">Going Up</marquee>
    <hr>

    <marquee direction="down">Going Up</marquee>
    <hr>

    <marquee behavior="alternate">Alternate</marquee>
    <hr>

    <marquee behavior="slide">Slide</marquee>
    <hr>

    <marquee behavior="alternate"direction="right">Alternate & Right</marquee>
    <hr>

    <marquee behavior="slide" direction="right">Slide & Right</marquee>
    <hr>

    <marquee behavior="slide" direction="right" scrollamount="40">Slide & Right & Fast</marquee>
    <hr>

    <marquee scrollamount="60" direction="">I am Speed</marquee>
    <hr>


<br><br><br>

</body>
</html>
